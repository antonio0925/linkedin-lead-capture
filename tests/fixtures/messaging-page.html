<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Messaging | LinkedIn</title></head>
<body>
  <!-- Messaging overlay / page with conversation -->
  <div class="msg-overlay-conversation-bubble">
    <header class="msg-overlay-bubble-header">
      <h2 class="msg-overlay-bubble-header__title">
        <a href="/in/janedoe/" data-control-name="conversation_profile_link">
          <span>Jane Doe</span>
        </a>
      </h2>
      <p class="msg-overlay-bubble-header__subtitle">Head of Growth at TechCorp</p>
    </header>
    <div class="msg-s-message-list-content">
      <!-- messages -->
    </div>
    <form class="msg-form">
      <div class="msg-form__contenteditable" contenteditable="true"></div>
      <button type="submit" aria-label="Send message" class="msg-form__send-button">Send</button>
    </form>
  </div>
</body>
</html>
