<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Search Results | LinkedIn</title></head>
<body>
  <div class="search-results-container">
    <!-- A single search result card -->
    <div class="reusable-search__result-container" data-chameleon-result-urn="urn:li:member:67890">
      <div class="entity-result">
        <!-- Profile image -->
        <div class="entity-result__image">
          <img src="https://media.licdn.com/photo/bobjones.jpg" alt="Bob Jones" />
        </div>

        <!-- Name with profile link -->
        <a href="https://www.linkedin.com/in/bobjones/" data-control-name="search_srp_result">
          <span aria-hidden="true">Bob Jones</span>
        </a>

        <!-- Headline -->
        <div class="entity-result__primary-subtitle">
          CTO at StartupXYZ
        </div>

        <!-- Connect button -->
        <button aria-label="Invite Bob Jones to connect" data-control-name="connect">
          <span>Connect</span>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
