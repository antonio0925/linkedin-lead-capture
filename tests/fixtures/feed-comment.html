<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>LinkedIn Feed — Comment</title></head>
<body>
  <div class="scaffold-finite-scroll__content">
    <div data-urn="urn:li:activity:123456789" data-id="feed-post-comment-1">

      <!-- Actor info -->
      <div class="update-components-actor">
        <a data-control-name="actor" href="https://www.linkedin.com/in/bobsmith/">
          <span aria-hidden="true">Bob Smith</span>
        </a>
        <div class="update-components-actor__description">
          <span aria-hidden="true">CTO at StartupXYZ</span>
        </div>
        <div class="update-components-actor__image">
          <img src="https://media.licdn.com/photo/bobsmith.jpg" alt="Bob Smith" />
        </div>
      </div>

      <!-- Post content -->
      <div class="feed-shared-update-v2__description-wrapper">
        <p>Just shipped a new feature!</p>
      </div>

      <!-- Comment box -->
      <div class="comments-comment-box">
        <button aria-label="Post comment" class="comments-comment-box__submit-button">Post</button>
      </div>

      <!-- Reaction bar with Repost button -->
      <div class="social-details-social-activity">
        <button aria-label="Like Bob Smith's post" data-reaction-type="LIKE">
          <span>Like</span>
        </button>
        <button aria-label="Repost Bob Smith's post">
          <span>Repost</span>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
