<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>John Doe | LinkedIn</title></head>
<body>
  <main>
    <section>
      <h1>John Doe</h1>

      <!-- Headline (primary selector) -->
      <div data-generated-suggestion-target="headline_cta"></div>
      <div>VP of Sales at Acme Corp</div>

      <!-- Headline fallback -->
      <div class="text-body-medium">VP of Sales at Acme Corp</div>

      <!-- Profile image -->
      <img alt="John Doe, profile photo" src="https://media.licdn.com/photo/johndoe.jpg" />

      <!-- Location -->
      <div class="text-body-small">San Francisco Bay Area</div>

      <!-- Connection degree -->
      <span class="dist-value">2nd</span>
    </section>

    <!-- Experience section -->
    <div id="experience"></div>
    <div class="pvs-list__outer-container">
      <a data-field="experience_company_logo" href="/company/acme-corp/">
        <span aria-hidden="true">Acme Corp</span>
      </a>
    </div>
  </main>

  <!-- Action buttons -->
  <div class="pvs-profile-actions">
    <button aria-label="Invite John Doe to connect" data-control-name="connect">
      <span>Connect</span>
    </button>
    <button aria-label="Message John Doe">
      <span>Message</span>
    </button>
  </div>
</body>
</html>
